name: actionlint

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        env:
          # renovate: datasource=github-release-attachments depName=rhysd/actionlint
          ACTIONLINT_VERSION: "1.7.11"
          ACTIONLINT_CHECKSUM: "900919a84f2229bac68ca9cd4103ea297abc35e9689ebb842c6e34a3d1b01b0a"
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          echo "${ACTIONLINT_CHECKSUM}  ${archive}" | sha256sum -c -
          tar xzf "${archive}" actionlint
          rm -f "${archive}"

      - name: Run actionlint
        run: >-
          find .github/workflows -name '*.yml'
          -not -path '*/actions/*'
          -not -path '*/config/*'
          -exec ./actionlint -color {} +

# bplus ローカル開発環境（最小構成: Rails API + PostgreSQL）
# 必要になったら C2 の流儀で s3(minio) / mail(mailhog) / redis 等を追加する。

services:
  api:
    build:
      context: .
      dockerfile: ./docker/dev/api/Dockerfile
      args:
        RUBY_VERSION: "3.4.9"
    command: bash -c "bundle check || bundle install && rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - ./api:/app:cached
      - bundle:/bundle:cached
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      BOOTSNAP_CACHE_DIR: /bundle/bootsnap
    tty: true
    stdin_open: true
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bundle:
  postgres:
